[pytest]
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests that require trajectory fixtures and run end-to-end
    unit: marks unit tests (default; the marker is optional)

testpaths =
    tests

python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts = --verbose --durations=10
